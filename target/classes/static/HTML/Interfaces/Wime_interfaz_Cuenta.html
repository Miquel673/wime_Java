<!DOCTYPE html>
<html lang="es">

<head>
  <!-- ================= META ================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WIME | Mi Perfil</title>

  <!-- ================= BOOTSTRAP ================= -->
  <link rel="stylesheet" href="/bootstrap-5.3.7-dist/css/bootstrap.min.css">

  <!-- ================= ICONOS ================= -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- ================= ESTILOS PROPIOS ================= -->
  <link rel="stylesheet" href="../../Css/Interfaces/Wime_interfaz_cuenta.css">
  <script src="../../Js/Config-Services/TemaConfig.js"></script>

  <!-- ================= FAVICON ================= -->
  <link rel="icon" type="image/png" href="../../IMG/Logo_Wime.png">
</head>

<body>

  <!-- ===================================================== -->
  <!-- ===================== SIDEBAR ======================== -->
  <!-- ===================================================== -->

  <button class="toggle-sidebar d-md-none" onclick="toggleSidebar()">
    <i class="bi bi-list"></i>
  </button>

  <div id="sidebar-container"></div>


  <!-- ===================================================== -->
  <!-- ================= CONTENIDO PRINCIPAL =============== -->
  <!-- ===================================================== -->

  <main class="main-content container-fluid px-3 px-md-4 py-3">

  <!-- Barra superior -->
  <div class="d-flex justify-content-between align-items-center 
              mb-3 text-bg-primary p-3 rounded-bottom flex-wrap gap-2">
    <span></span>
    <div id="fecha-actual" class="text-end w-100 w-md-auto">
      Cargando Fecha...
    </div>
  </div>

  <!-- Perfil centrado en móvil -->
  <div class="text-center text-md-start mb-3">
    <img id="fotoPerfil"
         src="../../IMG/EmptyAvatar.jpeg"
         alt="Avatar"
         class="rounded-circle bg-secondary mb-2"
         style="width: 80px; height: 80px; object-fit: cover;">

    <h1 class="fs-5 fs-md-4 text-primary-emphasis" id="usuario-nombre">
      Bienvenido, ...
    </h1>
  </div>

  <!-- Layout adaptable -->
  <div class="row g-3">

    <!-- Columna lateral -->
    <div class="col-12 col-md-4 col-lg-3">

      <div class="bg-white border p-3 rounded shadow-sm h-100">

        <a href="../Interfaces/Wime_interfaz_Tablero.html"
           class="btn btn-outline-primary w-100 mb-2">
           Mi tablero
        </a>

        <button class="btn btn-primary w-100 my-2"
                data-bs-toggle="modal"
                data-bs-target="#modalNuevo">
          ➕ Crear
        </button>

        <div class="mt-3">
          <div id="listaNotificaciones"></div>
        </div>

      </div>
    </div>

    <!-- Panel principal -->
    <div class="col-12 col-md-8 col-lg-9">

      <div class="bg-white border p-3 rounded shadow-sm">

        <h5 class="mb-3">Productividad:</h5>

        <ul class="ps-3">
          <li>Tareas Realizadas:
            <strong id="tareas-completadas">0</strong>
          </li>
          <li>Rutinas Finalizadas:
            <strong id="rutinas-finalizadas">0</strong>
          </li>
          <li>En proceso:
            <strong id="en-proceso">0</strong>
          </li>
        </ul>

        <div class="card shadow-sm my-4">
          <div class="card-header bg-primary text-white text-center text-md-start">
            <h5 class="mb-0">📊 Resumen de Actividades</h5>
          </div>
          <div class="card-body">
            <canvas id="grafico-estadisticas" height="120"></canvas>
          </div>
        </div>

        <!-- Botones adaptables -->
        <div class="d-flex flex-column flex-md-row gap-2">
          <button class="btn btn-success w-100 w-md-auto">
            📈 Progreso
          </button>

          <a href="./Functions/ReporteForm.html"
             class="btn btn-secondary w-100 w-md-auto text-white text-decoration-none">
            📋 Reporte
          </a>
        </div>

      </div>
    </div>

  </div>

</main>


  <!-- ===================================================== -->
  <!-- ======================= MODAL ======================== -->
  <!-- ===================================================== -->

  <div class="modal fade" id="modalNuevo" tabindex="-1"
       aria-labelledby="modalNuevoLabel" aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="modalNuevoLabel">
            ¿Qué deseas crear?
          </h5>
          <button type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Cerrar">
          </button>
        </div>

        <div class="modal-body d-flex flex-column gap-2">
          <a href="../Modules/Wime_interfaz_Modulo_CTareas.html"
             class="btn btn-primary">Crear Tarea</a>

          <a href="../Modules/Wime_interfaz_Modulo_CRutinas.html"
             class="btn btn-success">Crear Rutina</a>
        </div>

      </div>
    </div>
  </div>


  <!-- ===================================================== -->
  <!-- ======================= SCRIPTS ====================== -->
  <!-- ===================================================== -->

  <!-- Librerías -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/bootstrap-5.3.7-dist/js/bootstrap.bundle.min.js"></script>

  <!-- Scripts propios -->
  <script src="../../Js/Functions/calendario.js"></script>
  <script src="../../Js/Functions/Estadisticas.js"></script>
  <script src="../../Js/Functions/Notificacion.js"></script>
  <script src="../../Js/Config-Services/ConfiguracionUsuario.js"></script>


  <!-- ================= SCRIPT PRINCIPAL ================= -->
  <script>

    /* ================= TOGGLE SIDEBAR ================= */
    function toggleSidebar() {
      document.body.classList.toggle('sidebar-visible');
    }

    /* ================= INICIALIZACIÓN GENERAL ================= */
    document.addEventListener("DOMContentLoaded", async () => {

      mostrarFechaActual();
      await verificarSesion();
      cargarEstadisticas();
      cargarFotoPerfil();
      cargarSidebar();

    });

    /* ================= FUNCIONES ================= */

    function mostrarFechaActual() {
      const hoy = new Date();
      const dia = String(hoy.getDate()).padStart(2, '0');
      const mes = String(hoy.getMonth() + 1).padStart(2, '0');
      const anio = hoy.getFullYear();

      document.getElementById("fecha-actual").textContent =
        `Fecha actual: ${dia}/${mes}/${anio}`;
    }

    async function verificarSesion() {
      try {
        const res = await fetch("/api/auth/check-session", { credentials: "include" });
        const data = await res.json();

        if (data.active) {
          document.getElementById("usuario-nombre").textContent =
            `Bienvenido, ${data.usuario}`;
        } else {
          window.location.href = "../Login.html";
        }
      } catch {
        window.location.href = "../Login.html";
      }
    }

    async function cargarEstadisticas() {
      try {
        const res = await fetch("/api/estadisticas", { credentials: "include" });
        const data = await res.json();

        if (data.success) {
          document.getElementById("tareas-completadas").textContent = data.tareas_completadas;
          document.getElementById("rutinas-finalizadas").textContent = data.rutinas_finalizadas;
          document.getElementById("en-proceso").textContent = data.en_proceso;
        }
      } catch (e) {
        console.error("Error cargando estadísticas:", e);
      }
    }

    async function cargarFotoPerfil() {
      const idUsuario = sessionStorage.getItem("idUsuario");
      const img = document.getElementById("fotoPerfil");

      if (!idUsuario || !img) return;

      try {
        const response = await fetch(
          `/api/usuarios/${idUsuario}/foto`,
          { credentials: "include" }
        );

        const data = await response.json();

        img.src = data.fotoPerfil
          ? data.fotoPerfil + `?t=${Date.now()}`
          : "/IMG/vector-de-perfil-avatar-predeterminado-foto-usuario-medios-sociales-icono-183042379.jpeg";

      } catch {
        img.src = "/IMG/vector-de-perfil-avatar-predeterminado-foto-usuario-medios-sociales-icono-183042379.jpeg";
      }
    }

    function cargarSidebar() {
      fetch('./Functions/Wime_SideBar.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('sidebar-container').innerHTML = html;
        })
        .catch(err => console.error("Error cargando sidebar:", err));
    }

  </script>

</body>
</html>
