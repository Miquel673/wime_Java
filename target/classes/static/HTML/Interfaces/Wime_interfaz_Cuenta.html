<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Usuario | Wime</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../../Css/Interfaces/Wime_interfaz_cuenta.css">
  <script defer src="../../Js/Modules/Wime_Cuenta.js"></script>

</head>
<body>

<div class="sidebar">
    <h2>WIME</h2>
    <hr>

    <nav>
        <a href="../Interfaces/Wime_interfaz_Tablero.html">
            <i class="bi bi-grid-1x2"></i> Mi Tablero
        </a>

        <a href="#" class="nav-active">
            <i class="bi bi-person-circle"></i> Perfil
        </a>

        <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#modalTarea">
            <i class="bi bi-plus-circle"></i> Nueva Tarea
        </button>

        <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#modalRutina">
            <i class="bi bi-calendar-plus"></i> Nueva Rutina
        </button>

        <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#modalNotif">
            <i class="bi bi-bell"></i>
            Notificaciones
        </button>


        <hr>

        <button class="nav-btn" onclick="cerrarSesion()">
            <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
        </button>
    </nav>

    <div class="sidebar-calendar">
        <div class="d-flex justify-content-between align-items-center mb-3 text-white">
            <i class="bi bi-chevron-left cursor-pointer" onclick="moveMonth(-1)"></i>
            <span id="calMonthYear" class="fw-bold"></span>
            <i class="bi bi-chevron-right cursor-pointer" onclick="moveMonth(1)"></i>
        </div>

        <div class="cal-grid" id="calGrid"></div>
    </div>
</div>

<div class="content">

  <button id="themeToggle" class="theme-btn">
    <i id="themeIcon" class="bi bi-sun"></i>
  </button>

  <div class="container-fluid d-flex justify-content-center">
    <div class="col-12 col-lg-10 col-xl-8">
      
      <div class="card p-4 mb-4 position-relative border-0 shadow">
        <button type="button" class="btn-settings-icon" data-bs-toggle="modal" data-bs-target="#modalAjustesCuenta">
            <i class="bi bi-gear-fill"></i>
        </button>

        <div class="text-center mb-4">
          <div class="profile-img-container shadow">

                <!-- correo del usuario -->
            <div id="correoUsuario" class="correo-usuario"></div>
            <img id="preview" src="../../IMG/EmptyAvatar.jpeg" class="profile-img" alt="Perfil">
          </div>
        </div>

        <form>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Cambiar Foto</label>
              <input type="file" class="form-control" id="imageInput">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Nombre</label>
              <input type="text" id="nombreUsuario" class="form-control" placeholder="Escribe tu nombre">
            </div>
          </div>
          <button type="button" onclick="guardarCambiosPerfil()" class="btn btn-gradient w-100 py-2 mt-2 fw-bold rounded-pill">
          Guardar Cambios
          </button>

        </form>
      </div>

      <div class="card p-4 border-0 shadow">
        <h5 class="fw-bold mb-4 d-flex justify-content-between align-items-center">
            <span><i class="bi bi-bar-chart-line me-2"></i>Rendimiento</span>
            <span class="badge bg-primary rounded-pill" style="font-size: 0.7rem;">En vivo</span>
        </h5>
        
        <div class="stats-container">
          <div class="mb-3">
            <div class="d-flex justify-content-between mb-1">
                <span class="fw-bold small">Tareas Completadas</span>
                <span class="text-success small fw-bold">82%</span>
            </div>
            <div class="progreso"><div class="barra verde" style="width: 82%;"></div></div>
          </div>
          <div class="mb-3">
            <div class="d-flex justify-content-between mb-1">
                <span class="fw-bold small">Tarea en Progreso</span>
                <span class="text-warning small fw-bold">45%</span>
            </div>
            <div class="progreso"><div class="barra amarillo" style="width: 45%;"></div></div>
          </div>
          <div class="mb-3">
            <div class="d-flex justify-content-between mb-1">
                <span class="fw-bold small">Tareas Fallidas</span>
                <span class="text-danger small fw-bold">12%</span>
            </div>
            <div class="progreso"><div class="barra rojo" style="width: 12%;"></div></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="modalAjustesCuenta" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg p-4">
            <div class="modal-header border-0 p-0 mb-3">
                <h5 class="modal-title fw-bold">Ajustes de Seguridad</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <div class="mb-3 position-relative">
                  <label class="form-label fw-bold small">Nueva Contraseña</label>
                  <input type="password" id="nuevaPassword" class="form-control rounded-pill px-4 py-2">
                  <i class="bi bi-eye-slash toggle-pass" onclick="togglePassword('nuevaPassword', this)"></i>
                </div>

                <div class="mb-3 position-relative">
                  <label class="form-label fw-bold small">Confirmar Contraseña</label>
                  <input type="password" id="confirmarPassword" class="form-control rounded-pill px-4 py-2">
                  <i class="bi bi-eye-slash toggle-pass" onclick="togglePassword('confirmarPassword', this)"></i>
                </div>
                <button type="button" class="btn btn-gradient w-100 py-3 fw-bold rounded-pill text-white mt-2" onclick="confirmarCambiosToast()">
                    Actualizar Datos
                </button>
            </div>
        </div>
    </div>
</div>

    <div class="modal fade" id="modalTarea" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4 shadow-lg">

            <h5 class="fw-bold mb-3">Crear Nueva Tarea</h5>

            <!-- Nombre -->
            <input 
                type="text" 
                id="task-name" 
                class="form-control mb-3 rounded-pill" 
                placeholder="Nombre de la tarea"
            >

            <!-- Fecha límite -->
            <input 
                type="date" 
                id="task-date" 
                class="form-control mb-3 rounded-pill"
            >

            <!-- Descripción -->
            <textarea 
                id="task-desc" 
                class="form-control mb-3"
                placeholder="Descripción..."
                style="border-radius: 15px; height: 80px; resize: none;"
            ></textarea>

            <!-- Prioridad -->
            <select 
                id="task-priority" 
                class="form-select mb-4 rounded-pill"
            >
                <option value="rojo">Prioridad Alta</option>
                <option value="amarillo">Prioridad Media</option>
                <option value="verde" selected>Prioridad Baja</option>
            </select>

            <!-- Botón guardar -->
            <button 
                class="btn-wime mb-3"
                onclick="addItem('tarea')"
            >
                Guardar Tarea
            </button>

            <!-- Compartir -->
            <div class="share-section">

                <label class="small fw-bold mb-2">
                Compartir por correo:
                </label>

                <input 
                type="email"
                id="task-share-email"
                class="form-control input-destinatario mb-2"
                placeholder="correo@ejemplo.com"
                >


            </div>

            </div>
        </div>
    </div>


<div class="modal fade" id="modalRutina" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg p-4">
            <h4 class="fw-bold mb-4">Nueva Rutina Diaria</h4>
            <div class="mb-3">
                <input type="text" class="form-control bg-transparent border-secondary rounded-pill px-4 py-2" placeholder="Ej: Beber agua">
            </div>
            <div class="mb-3">
                <textarea class="form-control bg-transparent border-secondary px-4 py-2" placeholder="Descripción de la rutina" style="border-radius: 20px; height: 80px; resize: none;"></textarea>
            </div>
            <div class="mb-4">
                <input type="time" class="form-control bg-transparent border-secondary rounded-pill px-4 py-2">
            </div>
            <button class="btn btn-gradient w-100 py-3 fw-bold rounded-pill text-white shadow">Crear Rutina</button>
        </div>
    </div>
</div>

<div class="modal fade" id="modalNotif" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg p-4">
            <h4 class="fw-bold mb-2">Notificaciones</h4>
            <hr class="opacity-50 mb-4">
            <div class="p-3 mb-2 d-flex align-items-center notification-item">
                <i class="bi bi-check-circle text-success me-3 fs-4"></i>
                <h6 class="m-0 fw-bold small">Tarea guardada: <span class="fw-normal">Interfaz Final</span></h6>
            </div>
            <div class="p-3 d-flex align-items-center notification-item">
                <i class="bi bi-clock text-primary me-3 fs-4"></i>
                <h6 class="m-0 fw-bold small">Rutina guardada: <span class="fw-normal">Cardio 20min</span></h6>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 9999">

  <div id="toastWime" class="toast align-items-center text-bg-dark border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMensaje">
        Mensaje
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../Js/Functions/Toast.js"></script>

</body>
</html>
