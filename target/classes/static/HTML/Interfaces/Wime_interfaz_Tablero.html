<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Wime</title>

  <!-- ================= LIBRERÍAS EXTERNAS ================= -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="/bootstrap-5.3.7-dist/css/bootstrap.min.css">

  <!-- ================= ESTILOS PROPIOS ================= -->
  <link rel="stylesheet" href="../../Css/Interfaces/Wime_interfaz_Tablero.Css">
  <link rel="stylesheet" href="../../Css/Interfaces/Funciones/Wime_SideBar.Css">

  <!-- ================= ICONO ================= -->
  <link rel="icon" type="image/png" href="/IMG/Logo_Wime.png">

</head>

<body>

    <!-- ===================================================== -->
    <!-- ======================== HEADER ====================== -->

  <header>

    <!-- Botón menú móvil -->
    <button class="toggle-sidebar d-md-none" onclick="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>

    <!-- Sidebar dinámico -->
    <div id="sidebar-container"></div>

    <!-- Modal Crear -->
    <div class="modal fade" id="modalNuevo" tabindex="-1"
         aria-labelledby="modalNuevoLabel" aria-hidden="true">

      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">

          <div class="modal-header">
            <h5 class="modal-title" id="modalNuevoLabel">¿Qué deseas crear?</h5>
            <button type="button" class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Cerrar">
            </button>
          </div>

          <div class="modal-body d-flex flex-column gap-2">
            <a href="../Modules/Wime_interfaz_Modulo_CTareas.html"
               class="btn btn-primary">
               Crear Tarea
            </a>

            <a href="../Modules/Wime_interfaz_Modulo_CRutinas.html"
               class="btn btn-success">
               Crear Rutina
            </a>
          </div>

        </div>
      </div>
    </div>

  </header>

  <!-- ===================================================== -->
  <!-- ========================= MAIN ======================= -->

  <main class="main" id="Main">

    <h1 class="titulo">Tablero</h1>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tipo="tareas">Tareas</div>
      <div class="tab" data-tipo="rutinas">Rutinas</div>
    </div>

    <!-- Barra superior -->
    <div class="top-bar d-flex gap-3 align-items-center flex-wrap">

      <input type="text"
             id="busqueda"
             class="form-control"
             placeholder="🔍 Buscar"
             style="max-width: 300px;">

      <button class="btn btn-primary">
        <a id="nuevoBtn"
           href="#"
           class="link-offset-2 link-underline link-underline-opacity-0 text-light"
           data-bs-toggle="modal"
           data-bs-target="#modalNuevo">
           Nuevo
        </a>
      </button>

    </div>

    <!-- Filtro estado -->
    <select id="filtro-estado"
            class="form-select"
            style="max-width: 200px;">

      <option value="">Todos los estados</option>
      <option value="pendiente">Pendiente</option>
      <option value="en progreso">En progreso</option>
      <option value="completada">Completada</option>
    </select>

    <!-- Contenido dinámico -->
    <div id="contenido">

      <div id="contenedor-tareas"
           class="row row-cols-2 row-cols-md-4 g-4 mt-3">
      </div>

      <div id="contenedor-rutinas"
           class="row row-cols-2 row-cols-md-4 g-4 mt-3"
           style="display: none;">
      </div>

    </div>

  </main>


  <!-- Toasts globales -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3"
       id="toastContainer">
  </div>


  <!-- ===================================================== -->
  <!-- ======================== SCRIPTS ===================== -->
  <!-- ===================================================== -->

  <!-- Bootstrap -->
  <script src="/bootstrap-5.3.7-dist/js/bootstrap.bundle.min.js"></script>

  <!-- Scripts propios -->
  <script src="../../Js/Modules/Wime_Modulo_CTyR.js"></script>
  <script src="../../Js/Functions/calendario.js"></script>
  <script src="../../Js/Functions/Filtros.js"></script>
  <script src="../../Js/Config-Services/TemaConfig.js"></script>

  <!-- Scripts internos -->
  <script>

    /* =========================
       TOGGLE SIDEBAR
    ========================= */
    function toggleSidebar() {
      document.body.classList.toggle('sidebar-visible');
    }

    /* =========================
       VERIFICAR SESIÓN
    ========================= */
    document.addEventListener("DOMContentLoaded", () => {
      fetch("/api/auth/check-session", {
        method: "GET",
        credentials: "include"
      })
        .then(res => res.json())
        .then(data => {
          if (data.active) {
            const titulo = document.querySelector(".titulo");
            if (titulo) {
              titulo.innerText = `Tablero de ${data.usuario}`;
            }
          } else {
            window.location.href = "../../Login.html";
          }
        })
        .catch(() => {
          window.location.href = "../../Login.html";
        });
    });

    /* =========================
       LOGOUT
    ========================= */
    async function cerrarSesion() {
      try {
        const resp = await fetch('/api/auth/logout', {
          method: 'POST',
          credentials: 'include'
        });

        let data = null;
        try { data = await resp.json(); } catch(e) {}

        if (resp.ok && data && data.success) {
          window.location.href = '../../Login.html';
        } else {
          alert('Error cerrando sesión.');
        }

      } catch {
        alert('Error de conexión al cerrar sesión.');
      }
    }

    /* =========================
       INICIALIZAR SIDEBAR
    ========================= */
    function initSidebarFeatures(container) {

      const logoutBtn =
        container.querySelector('#logout-btn') ||
        container.querySelector('.sidebar-footer button');

      if (logoutBtn) {
        logoutBtn.addEventListener('click', cerrarSesion);
      }

      if (typeof inicializarCalendario === 'function') {
        try { inicializarCalendario(); } catch(e) {}
      }
    }

    /* =========================
       CARGAR SIDEBAR
    ========================= */
    fetch('../Interfaces/Functions/Wime_SideBar.html')
      .then(r => r.text())
      .then(html => {
        const container = document.getElementById('sidebar-container');
        container.innerHTML = html;
        initSidebarFeatures(container);
      })
      .catch(err => {
        console.error('Error cargando sidebar:', err);
      });

  </script>

</body>
</html>
