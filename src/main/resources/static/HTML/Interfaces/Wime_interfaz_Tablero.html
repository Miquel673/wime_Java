<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WIME | Tablero</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../Css/Interfaces/Wime_interfaz_Tablero.Css">
    <link rel="stylesheet" href="../../Css/Interfaces/Funciones/Wime_Funcion_Calendario.Css">
    <script defer src="../../Js/Functions/Estadisticas.js"></script>
    <script defer src="../../Js/Functions/calendario.js"></script>
    <script defer src="../../Js/Modules/Wime_Tablero.js"></script>

</head>
<body>

    <div class="sidebar">
        <h2>WIME</h2>
        <hr>
        <nav>
            <a href="#" class="nav-active"><i class="bi bi-grid-1x2"></i> Mi Tablero</a>
            <a href="../Interfaces/Wime_interfaz_Cuenta.html"><i class="bi bi-person-circle"></i> Perfil</a>
            <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#modalTarea"><i class="bi bi-plus-circle"></i> Nueva Tarea</button>
            <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#modalRutina"><i class="bi bi-calendar-plus"></i> Nueva Rutina</button>
            <button class="nav-btn" data-bs-toggle="modal" data-bs-target="#modalNotif"><i class="bi bi-bell"></i>Notificaciones</button>
            <hr>
            <button class="nav-btn" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right"></i> Cerrar Sesión</button>
        </nav>

        <div class="sidebar-calendar">
            <div class="d-flex justify-content-between align-items-center mb-3 text-white">
                <i class="bi bi-chevron-left cursor-pointer" onclick="moveMonth(-1)"></i>
                <span id="calMonthYear" class="fw-bold"></span>
                <i class="bi bi-chevron-right cursor-pointer" onclick="moveMonth(1)"></i>
            </div>
            <div class="cal-grid" id="calGrid"></div>
        </div>
    </div>

    <main class="main-content">
        <div class="user-banner shadow">
            <img id="fotoPerfil" src="../../IMG/EmptyAvatar.jpeg" alt="Perfil">
            <div>
                <h1 id="bienvenida" class="fw-bold mb-1" style="color: white !important;"></h1>
                <p class="mb-0 opacity-75" id="fecha-actual" style="color: white !important;"></p>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">Metas del Día</h4>
            <div class="btn-group" id="filter-group">
                <button class="btn btn-outline-primary btn-sm active" onclick="filtrar('todas', this)">Todas</button>
                <button class="btn btn-outline-primary btn-sm" onclick="filtrar('rutina', this)">Rutinas</button>
                <button class="btn btn-outline-primary btn-sm" onclick="filtrar('tarea', this)">Tareas</button>
            </div>
        </div>

        <div id="contenedor-items" class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3"></div>

        <div class="performance-card shadow-sm">
            <h5 class="fw-bold mb-4"><i class="bi bi-bar-chart-line me-2"></i>Rendimiento</h5>
            <div class="mb-4">
                <div class="d-flex justify-content-between"><span class="small fw-bold">Completadas</span><span id="stat-completadas" class="text-success small fw-bold">0%</span></div>
                <div class="progreso"><div id="bar-completadas" class="barra verde" style="width: 0%;"></div></div>
            </div>
            <div class="mb-4">
                <div class="d-flex justify-content-between"><span class="small fw-bold">Pendientes</span><span id="stat-pendientes" class="text-warning small fw-bold">0%</span></div>
                <div class="progreso"><div id="bar-pendientes" class="barra amarillo" style="width: 0%;"></div></div>
            </div>

            <div class="mb-0">
            <div class="d-flex justify-content-between">
                <span class="small fw-bold">Vencidas</span>
                <span id="stat-vencidas" class="text-danger small fw-bold">0%</span>
            </div>

            <div class="progreso">
                <div id="bar-vencidas" class="barra rojo" style="width:0%"></div>
            </div>
            </div>
        </div>

        

        
    </main>

    <div class="modal fade" id="modalTarea" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4 shadow-lg">

            <h5 class="fw-bold mb-3">Crear Nueva Tarea</h5>

            <!-- Nombre -->
            <input 
                type="text" 
                id="task-name" 
                class="form-control mb-3 rounded-pill" 
                placeholder="Nombre de la tarea"
            >

            <!-- Fecha límite -->
            <input 
                type="date" 
                id="task-date" 
                class="form-control mb-3 rounded-pill"
            >

            <!-- Descripción -->
            <textarea 
                id="task-desc" 
                class="form-control mb-3"
                placeholder="Descripción..."
                style="border-radius: 15px; height: 80px; resize: none;"
            ></textarea>

            <!-- Prioridad -->
            <select 
                id="task-priority" 
                class="form-select mb-4 rounded-pill"
            >
                <option value="rojo">Prioridad Alta</option>
                <option value="amarillo">Prioridad Media</option>
                <option value="verde" selected>Prioridad Baja</option>
            </select>

            <!-- Botón guardar -->
            <button 
                class="btn-wime mb-3"
                onclick="addItem('tarea')"
            >
                Guardar Tarea
            </button>

            <!-- Compartir -->
            <div class="share-section">

                <label class="small fw-bold mb-2">
                Compartir por correo:
                </label>

                <input 
                type="email"
                id="task-share-email"
                class="form-control input-destinatario mb-2"
                placeholder="correo@ejemplo.com"
                >


            </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalRutina" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4 shadow-lg">
                <h5 class="fw-bold mb-3">Nueva Rutina Diaria</h5>
                <input type="text" id="routine-name" class="form-control mb-3 rounded-pill" placeholder="Ej: Beber Agua">
                <textarea id="routine-desc" class="form-control mb-3" placeholder="Descripción..." style="border-radius: 15px; height: 80px; resize: none;"></textarea>
                <input type="time" id="routine-time" class="form-control mb-4 rounded-pill">
                <button class="btn-wime mb-3" onclick="addItem('rutina')">Crear Rutina</button>

                <div class="share-section">
                    <label class="small fw-bold mb-2">Compartir por correo:</label>
                    <input type="email" id="routine-share-email" class="form-control input-destinatario" placeholder="correo@ejemplo.com">
                    <button class="btn-share" onclick="compartirPorCorreo('rutina')">
                        <i class="bi bi-send me-2"></i>Enviar a destinatario
                    </button>
                </div>
            </div>
        </div>
    </div>

<div class="modal fade" id="modalNotif" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg p-4">

      <h4 class="fw-bold mb-2">Notificaciones</h4>
      <hr class="opacity-50 mb-4">

      <!-- CONTENEDOR DINÁMICO -->
      <div id="listaNotificaciones" class="lista-notificaciones"></div>

      <!-- BOTONES -->
      <div class="d-flex justify-content-between mt-3">
        <button class="btn btn-sm btn-outline-primary" id="btnMarcarLeidas">
          Marcar como leídas
        </button>

        <button class="btn btn-sm btn-outline-danger" id="btnEliminarNotificaciones">
          Borrar todas
        </button>
      </div>

    </div>
  </div>
</div>



    <div id="toast-container"
        class="toast-container position-fixed top-0 end-0 p-3"
        style="z-index: 9999;">
    </div>

    <button id="themeToggle" class="theme-btn"><i id="themeIcon" class="bi bi-sun"></i></button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../Js/Modules/Wime_Modulo_CT.js"></script>
    <script src="../../Js/Functions/Toast.js"></script>
    <script src="../../Js/Functions/Notificacion.js"></script>
    <script src="../../Js/Functions/Estadisticas.js"></script>




</body>
</html>
