# Nombre de la aplicación
spring.application.name=wime

# Puerto del servidor (Tomcat embebido)
server.port=8080

# Configuración de la base de datos (ajusta user y password)
spring.datasource.url=jdbc:mysql://localhost:3306/wime?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA (para que genere las tablas si no existen)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
