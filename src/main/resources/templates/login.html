<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-96">
        <h2 class="text-2xl font-bold text-center text-white mb-6">Iniciar Sesión</h2>

        <form th:action="@{/auth/login}" method="post" class="space-y-4">
            <div>
                <label class="block text-gray-300 mb-1">Correo</label>
                <input type="text" name="username" placeholder="Correo" required
                       class="w-full p-2 rounded bg-gray-700 text-white focus:outline-none focus:ring focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-300 mb-1">Contraseña</label>
                <input type="password" name="password" placeholder="Contraseña" required
                       class="w-full p-2 rounded bg-gray-700 text-white focus:outline-none focus:ring focus:ring-blue-500">
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg">
                Ingresar
            </button>
        </form>

        <p th:if="${param.error}" style="color: red;">Usuario o contraseña incorrectos</p>


        <p th:if="${param.error}" class="text-red-400 text-center mt-4">
            Usuario o contraseña incorrectos
        </p>

        <p th:if="${param.logout}" class="text-green-400 text-center mt-4">
            Sesión cerrada correctamente
        </p>
    </div>
</body>
</html>
